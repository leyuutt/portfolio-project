    <section>

    <h2>Contact Me</h2>
    <form action="#" method="post">
        <!-- Text Input -->
        <div>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>
        <br>

        <!-- Number Input -->
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>
        </div>
        <br>

        <!-- Radio Buttons (Gender) -->
        <div>
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label><br>
            
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label><br>
            
            <input type="radio" id="other" name="gender" value="other" required>
            <label for="other">Other</label>
        </div>
        <br>

        <!-- Checkbox (Subscribe) -->
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <br>

        <!-- Range Input (Satisfaction Level) -->
        <div>
            <label for="satisfaction">Satisfaction Level (0-10):</label><br>
            <input type="range" id="satisfaction" name="satisfaction" min="0" max="10" value="5">
        </div>
        <br>

        <!-- Additional Text Input for Message -->
        <div>
            <label for="message">Your Message:</label><br>
            <input type="text" id="message" name="message" required>
        </div>
        <br>

        <!-- Submit and Regular Buttons -->
        <div>
            <button type="submit">Submit Form</button>
            <button type="button">Regular Button</button>
        </div>
    </form>
